name: Spring Boot Docker Build Push ACR

on:
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER: abhilashacr2026.azurecr.io
  IMAGE_NAME: passenger-management

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Start timer
        run: echo "START_TIME=$(date +%s)" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Maven build
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Docker login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.ACR_LOGIN_SERVER }} \
            -u "${{ secrets.ACR_USERNAME }}" \
            --password-stdin

      - name: Docker build
        run: |
          docker build -t ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:gha-${{ github.run_number }} .

      - name: Docker push
        run: |
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:gha-${{ github.run_number }}

      - name: Total time
        run: |
          END_TIME=$(date +%s)
          TOTAL=$((END_TIME - START_TIME))
          echo "GHA Spring Boot Docker build + push time: $TOTAL seconds"
